services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ritsino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ritsino_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ritsino}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/02_functions.sql:/docker-entrypoint-initdb.d/02_functions.sql
      - ./database/03_triggers.sql:/docker-entrypoint-initdb.d/03_triggers.sql
      - ./database/04_seed.sql:/docker-entrypoint-initdb.d/04_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ritsino}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ritsino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ritsino_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ritsino}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
